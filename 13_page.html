<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title></head>
    <link rel="stylesheet" href="13_page.css">
<body>
    <section class="section_hero">
       <header class="header">
            <a href="8_page.html"><img class="img_back" src="img/Vector.png" alt="back"></a>
            <span class="header_title">Cart</span>
        </header>
        <div class="swipe_hint">
            <img src="img/iwwa_swipe.svg" alt="">
            <span>swipe on an item to delete</span>
        </div>
        <div class="cart_list">
            <div class="item_row">
                <div class="card">
                    <img src="img/plate (2).png" class="item_img" alt="" width="69px" height="69px">
                    <div class="item_info">
                        <h3>Veggie tomato mix</h3>
                        <p class="price">#1,900</p>
                    </div>
                    <div class="stepper">
                        <b>-</b> <span>1</span> <b>+</b>
                    </div>
                </div>
            </div>
            <div class="item_row">
                <div class="card">
                    <img src="img/plate (3).png" class="item_img" alt="" width="60px" height="69px">
                    <div class="item_info">
                        <h3>Fishwith mix orange....</h3>
                        <p class="price">#1,900</p>
                    </div>
                    <div class="stepper">
                        <b>-</b> <span>1</span> <b>+</b>
                    </div>
                </div>
            </div>
            <div class="swipe_container">
                <div class="card" style="width: 300px; left: -40px;">
                    <div class="item_info">
                        <h3 >Veggie tomato mix</h3>
                        <p class="price">#1,900</p>
                    </div>
                    <div class="stepper">
                        <b>-</b> <span>1</span> <b>+</b>
                    </div>
                </div>
                <div class="action_buttons" style="left: -40px;">
                    <button class="circle_btn btn_heart">
                       <img src="img/heart.png" alt="" width="16px" height="14px">
                    </button>
                    <button class="circle_btn btn_orange">
                    </button>
                </div>
            </div>
        </div>
        <div class="hero_footer">
            <a href="11_page.html">
            <button class="hero_footer_button">Complete order</button>
            </a>
        </div>
    </section>
</body>
</html>
